{% extends 'layout.html' %}

{% block title %}
Borrow / Return
{% endblock %}

{% block content %}

<div class="page-header">

    <div>
        <h1>Borrow & Return</h1>
        <p>Manage book transactions</p>
    </div>

</div>

<div class="borrow-grid">

    <!-- BORROW -->

    <div class="form-card">

        <div class="card-header">

            <h2>
                <i class="fa-solid fa-book-open-reader"></i>
                Borrow Book
            </h2>

        </div>

        <form action="{{ url_for('borrowreturn') }}" method="POST">

            <div class="input-group">

                <label>Student ID</label>

                <input
                    type="number"
                    name="borrow_student_id"
                    placeholder="Enter Student ID"
                    required
                >

            </div>

            <div class="input-group">

                <label>Book ID</label>

                <input
                    type="number"
                    name="borrow_book_id"
                    placeholder="Enter Book ID"
                    required
                >

            </div>

            <button type="submit" class="primary-btn full-width">

                Borrow Book

            </button>

        </form>

    </div>

    <!-- RETURN -->

    <div class="form-card">

        <div class="card-header">

            <h2>
                <i class="fa-solid fa-rotate-left"></i>
                Return Book
            </h2>

        </div>

        <form action="{{ url_for('borrowreturn') }}" method="POST">

            <div class="input-group">

                <label>Borrow ID</label>

                <input
                    type="number"
                    name="return_borrow_id"
                    placeholder="Enter Borrow ID"
                    required
                >

            </div>

            <button type="submit" class="primary-btn full-width">

                Return Book

            </button>

        </form>

    </div>

</div>

{% endblock %}
